<style>
/* 核心：艺术感网格布局 */
.art-gallery {
  display: grid;
  /* 允许宽度自适应，最小 250px */
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  /* 基础行高 200px */
  grid-auto-rows: 200px; 
  grid-auto-flow: dense; 
  gap: 15px;

  justify-content: center;
}

/* 基础卡片样式 */
.art-item {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background: #f0f0f0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
}

/* 尺寸定义 */
.art-item.tall { grid-row: span 3; } /* 纵向跨 3 格，约 600px+ */
.art-item.wide { grid-column: span 2; } /* 横向跨 2 格 */

/* 强制填充逻辑 */
.art-item a {
  display: block;
  width: 100%;
  height: 100%;
}

.art-item img {
  width: 100%;
  height: 100%;
  /* 关键：确保图片填满容器且不变形 */
  object-fit: cover; 
  display: block;
  transition: all 0.6s ease;
}

/* 悬停特效 */
.art-item:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(48, 128, 208, 0.2);
}

.art-item:hover img {
  transform: scale(1.1);
  filter: brightness(0.8);
}

/* 文字浮层 */
.art-info {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
  color: white;
  opacity: 0;
  pointer-events: none; /* 防止文字遮挡点击 */
  transition: opacity 0.3s ease;
}

.art-item:hover .art-info {
  opacity: 1;
}
</style>
